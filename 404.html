<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | Corey Duffy</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <script>
    var theme = localStorage.getItem('theme');
    if (theme !== 'light' && theme !== 'dark') theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>404</h1>
                    <p class="hero-title">Page not found</p>
                    <p class="hero-tagline">The page you're looking for doesn't exist or has moved.</p>
                    <div class="hero-cta">
                        <a href="/" class="btn btn-primary">Back to home</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
